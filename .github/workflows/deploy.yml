on:
  push:
    branches:
      - main
name: 🚀 Deploy on push to main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/web-deploy@v1
        with:
          target-server: ftp.executiveheads.co.uk
          remote-user: executiveheads.co.uk
          private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          source-path: ./
          destination-path: public_html/wp-content/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**